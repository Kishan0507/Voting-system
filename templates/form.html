{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center py-5">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden" style="background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
            <div class="card-header bg-white border-bottom-0 text-center pt-5 pb-3">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3 shadow-sm" style="width: 70px; height: 70px;">
                    <i class="fas fa-edit fa-2x"></i>
                </div>
                <h2 class="h3 fw-bold text-dark mb-0">{{ title }}</h2>
                <p class="text-muted small mt-2 px-4">Please fill out the form below carefully.</p>
            </div>
            <div class="card-body px-4 px-md-5 pb-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="rounded-4 p-4 bg-light border shadow-sm mb-4">
                        {{ form|crispy }}
                    </div>
                    
                    <div class="d-grid mt-2 gap-3 d-md-flex justify-content-md-end">
                        <a href="javascript:history.back()" class="btn btn-light rounded-pill px-4 shadow-sm border">
                            <i class="fas fa-times me-2"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm">
                            <i class="fas fa-check me-2"></i> Submit Data
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
/* Refine Crispforms labels inside this card */
.asteriskField { color: #ef4444; }
label { font-weight: 500; color: #334155; margin-bottom: 0.5rem; }
.form-control, .form-select { border-radius: 10px; border-color: #cbd5e1; padding: 0.6rem 1rem; box-shadow: none !important; transition: all 0.2s ease; }
.form-control:focus, .form-select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important; }
</style>
{% endblock %}
